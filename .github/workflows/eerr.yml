name: Get Playit Secret
on: workflow_dispatch

jobs:
  get-key:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playit
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/playit.gpg
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt update && sudo apt install playit -y
      
      - name: Force Claim Link Output
        run: |
          echo "⏳ Requesting Claim Link..."
          # This creates a 'fake' terminal to capture the link
          script -q -c "timeout 60s playit setup" /dev/null | grep -E "https://playit.gg/claim/[a-zA-Z0-9-]+" || echo "Link not found in filtered output, checking raw..."
          
          # Fallback: Print everything if grep fails
          echo "--- RAW LOG START ---"
          timeout 20s playit setup || true
          echo "--- RAW LOG END ---"
