name: Get Playit Secret
on: workflow_dispatch

jobs:
  get-key:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playit
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/playit.gpg
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt update && sudo apt install playit -y
      
      - name: Generate Claim Link
        run: |
          echo "⏳ Starting Playit Setup..."
          echo "LOOK BELOW FOR THE CLAIM LINK!"
          # Just running 'playit setup' will generate the link and wait for you
          # We'll run it for 5 minutes then stop.
          timeout 300s playit setup || echo "Time is up!"
