name: Get Playit Secret
on: workflow_dispatch

jobs:
  get-key:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playit
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/playit.gpg
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt update && sudo apt install playit -y
      
      - name: Force Generate Claim Link
        run: |
          echo "⏳ Requesting Claim Link from Playit..."
          # We run 'playit run', which generates the link if playit.toml is missing
          # 'grep' will look for the link specifically
          timeout 60s playit run 2>&1 | grep -i "https://playit.gg/claim/" || echo "Check the full logs below if link didn't appear"
