name: Scheduled zx Server

on:
 # schedule:
  #  - cron: '30 9 * * *'  # This triggers at 9:30 AM UTC (3:00 PM IST)
  workflow_dispatch:      # Allows you to still click "Run workflow" manually

permissions:
  contents: write

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Server Automation
        env:
          MY_DOMAIN: ${{ secrets.MY_DOMAIN }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ESSENTIALS_DISCORD_TOKEN: ${{ secrets.ESSENTIALS_DISCORD_TOKEN }}
        run: |
          chmod +x automate.sh
          ./automate.sh
