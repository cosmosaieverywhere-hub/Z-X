name: Convert Paper JAR to Normal File

on:
  workflow_dispatch:

jobs:
  unlfs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for the bot to push changes back
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Force Convert paper-1.12.2.jar
        run: |
          # 1. Remove LFS tracking for this specific file
          git lfs untrack "paper-1.12.2.jar"
          
          # 2. Clean up .gitattributes if it exists
          if [ -f .gitattributes ]; then
            sed -i '/paper-1.12.2.jar/d' .gitattributes
            sed -i '/\.jar/d' .gitattributes
            [ -s .gitattributes ] || rm .gitattributes
          fi

          # 3. THE FORCE MOVE: Remove from index, then add back as a real binary
          git rm --cached "paper-1.12.2.jar"
          git add "paper-1.12.2.jar"
          if [ -f .gitattributes ]; then git add .gitattributes; fi

      - name: Commit and Push
        run: |
          git commit -m "fix: convert paper-1.12.2.jar from LFS to normal file" || echo "No changes"
          git push origin main
