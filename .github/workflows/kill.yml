name: Convert Paper JAR to Normal File

on:
  workflow_dispatch:

jobs:
  unlfs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # We don't set lfs: true here because we are fixing it manually

      - name: Force Download Real Binary
        run: |
          # 1. Stop tracking the file in LFS locally
          git lfs untrack "paper-1.12.2.jar"
          
          # 2. Delete the pointer file
          rm -f paper-1.12.2.jar
          
          # 3. Download the REAL file directly from your repo's raw link
          # Replace 'cosmosaieverywhere-hub' and 'Z-X' if your repo name changed
          curl -L "https://github.com/cosmosaieverywhere-hub/Z-X/raw/main/paper-1.12.2.jar" -o paper-1.12.2.jar
          
          # 4. Verify the size (it should be ~30MB to 40MB now, not 133 bytes)
          ls -lh paper-1.12.2.jar

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Remove from .gitattributes
          if [ -f .gitattributes ]; then
            sed -i '/paper-1.12.2.jar/d' .gitattributes
            [ -s .gitattributes ] || rm .gitattributes
          fi

          git add paper-1.12.2.jar
          if [ -f .gitattributes ]; then git add .gitattributes; fi
          
          git commit -m "fix: replace 133b pointer with actual jar binary"
          git push origin main
