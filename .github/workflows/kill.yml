name: Fix All Corrupted Plugins

on:
  workflow_dispatch:

jobs:
  fix-plugins:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force Download Real Plugin Binaries
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 1. Untrack all jars in the plugins folder from LFS
          git lfs untrack "plugins/*.jar"
          
          # 2. Loop through every jar in the plugins folder
          for plugin in plugins/*.jar; do
            echo "Processing $plugin..."
            
            # Delete the 133-byte pointer
            rm "$plugin"
            
            # Download the REAL binary from your repo's raw link
            # This uses the same trick that fixed your Paper JAR
            curl -L "https://github.com/cosmosaieverywhere-hub/Z-X/raw/main/$plugin" -o "$plugin"
            
            # Check size to make sure it's not a pointer anymore
            ls -lh "$plugin"
          done

      - name: Clean .gitattributes and Push
        run: |
          if [ -f .gitattributes ]; then
            # Remove any LFS lines related to the plugins folder
            sed -i '/plugins/d' .gitattributes
            [ -s .gitattributes ] || rm .gitattributes
          fi

          git add plugins/*.jar
          if [ -f .gitattributes ]; then git add .gitattributes; fi
          
          git commit -m "fix: converted all plugin pointers to real binaries" || echo "No changes"
          git push origin main
