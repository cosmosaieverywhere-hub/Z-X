name: Convert LFS to Normal File

on:
  workflow_dispatch:

jobs:
  unlfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove LFS Tracking
        run: |
          # 1. Stop tracking JARs in LFS
          git lfs untrack "*.jar"
          
          # 2. Only run sed if .gitattributes exists to avoid the crash
          if [ -f .gitattributes ]; then
            sed -i '/\.jar/d' .gitattributes
            # If the file is now empty, just remove it
            [ -s .gitattributes ] || rm .gitattributes
          fi
          
          # 3. Force Git to treat JARs as normal binaries
          # This moves them out of the LFS storage and into the git index
          git add --renormalize "**/*.jar"
          if [ -f .gitattributes ]; then git add .gitattributes; fi

      - name: Commit and Push
        run: |
          # Only commit if there are actually changes to avoid "nothing to commit" errors
          if ! git diff --cached --quiet; then
            git commit -m "chore: convert LFS jar to normal file"
            git push origin main
          else
            echo "No LFS files were found to convert."
          fi
