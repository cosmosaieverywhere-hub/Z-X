name: Convert LFS to Normal File

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  unlfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true # Crucial: This pulls the actual JAR data, not just the pointer
          fetch-depth: 0 # Pulls history to ensure a clean rewrite

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove LFS Tracking for JARs
        run: |
          # 1. Stop tracking .jar files in LFS
          git lfs untrack "*.jar"
          
          # 2. Remove .jar entries from .gitattributes
          sed -i '/\.jar/d' .gitattributes
          
          # 3. Force Git to see the JAR as a normal file again
          git add --renormalize .
          git add .gitattributes

      - name: Commit and Push
        run: |
          git commit -m "chore: convert LFS jar to normal file"
          git push origin main
